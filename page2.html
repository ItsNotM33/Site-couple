<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page 2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:#fff;overflow:hidden;}
.page{width:100vw;height:100vh;display:grid;grid-template-columns:190px 1fr 190px;}
.side{height:100vh;position:relative;background:url('assets/bordure-coeur.gif') center/cover no-repeat;overflow:hidden;}
.side::after{content:'';position:absolute;top:0;right:0;width:65px;height:100%;background:linear-gradient(to right,rgba(255,255,255,0),rgba(255,255,255,.95));}
.side.right::after{left:0;right:auto;background:linear-gradient(to left,rgba(255,255,255,0),rgba(255,255,255,.95));}
.center{position:relative;height:100vh;background:radial-gradient(circle at center,#ffffff 0%,#fff 60%,#fff7fb 100%);overflow:hidden;}
.sparkle,.heart,.butterfly,.petal{position:absolute;pointer-events:none;user-select:none;}
.sparkle{color:#ff87bd;animation:sparkle 2.8s ease-in-out infinite;opacity:.8;}
.heart{color:#ff8fc3;filter:drop-shadow(0 0 12px rgba(255,130,190,.45));animation:float 5s ease-in-out infinite;opacity:.75;}
.butterfly{top:13%;right:22%;font-size:58px;animation:butterfly 4.8s ease-in-out infinite;}
.petal{font-size:26px;opacity:.72;animation:petal 12s linear infinite;}
@keyframes sparkle{0%,100%{transform:scale(.8);opacity:.35;}50%{transform:scale(1.25);opacity:1;}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-18px);}}
@keyframes butterfly{0%,100%{transform:translate(0,0);}50%{transform:translate(-28px,18px);}}
@keyframes petal{0%{transform:translateY(-120px) rotate(0deg);opacity:0;}10%{opacity:.8;}100%{transform:translateY(115vh) translateX(40px) rotate(260deg);opacity:0;}}
</style>
</head>
<body>
<main class="page">
<aside class="side"></aside>
<section class="center">
<span class="sparkle" style="top:12%;left:18%;font-size:32px;">✦</span>
<span class="sparkle" style="top:20%;left:28%;font-size:18px;animation-delay:.7s;">✦</span>
<span class="sparkle" style="top:14%;right:14%;font-size:38px;animation-delay:.3s;">✦</span>
<span class="heart" style="top:13%;left:9%;font-size:38px;">♥</span>
<span class="heart" style="bottom:31%;left:13%;font-size:62px;animation-delay:.5s;">♥</span>
<span class="heart" style="top:50%;right:15%;font-size:42px;animation-delay:1.6s;">♥</span>
<span class="butterfly">🦋</span>
<span class="petal" style="left:12%;top:-5%;animation-duration:10s;">🌸</span>
<span class="petal" style="left:41%;top:-6%;animation-duration:11s;animation-delay:1s;">🌸</span>
<span class="petal" style="left:72%;top:-7%;animation-duration:12s;animation-delay:2s;">🌸</span>
</section>
<aside class="side right"></aside>
</main>
</body>
</html>
